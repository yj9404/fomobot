        <h1>FomoBot — 이미 오른 것들의 명예의 전당</h1>
        <p>FomoBot은 주식·부동산 등 급등 자산 랭킹 및 정보를 제공하는 서비스입니다. "그때 샀어야 했는데..." 하는 후회를 데이터로 보여줍니다. 투자 조언이 아니며, FomoBot은 지나간 걸 보여줄 뿐입니다.</p>

        <h2>주요 기능</h2>
        <p>기간별(전일·7일·30일·90일·1년·5년) 급등 랭킹을 제공하며, 상승률 외에도 변동성(σ), 지수 대비 초과수익, MDD(최대낙폭) 정보를 함께 보여줍니다. 랭킹에 오른 종목은 "그 시점에 샀다면 지금 수익률이 얼마였는가"를 바로 확인하는 백테스트 기능을 제공합니다. 시총이 너무 낮거나 거래대금이 없는 저유동성 종목은 자동으로 제외합니다.</p>

        <h2>주의사항</h2>
        <p>투자 조언이 아닙니다. FomoBot은 과거 데이터를 보여주는 도구일 뿐이며, 미래 수익을 보장하지 않습니다. 백테스트 결과는 생존 편향이 있습니다 — 상장폐지된 종목은 포함되지 않기 때문에 실제 수익률보다 좋게 보일 수 있습니다.</p>
