<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>읽을거리 — FomoBot</title>
  <meta name="description" content="FomoBot이 쓰는 데이터 분석, 방법론, 개발기 글 모음" />
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg" />
  <link rel="stylesheet" href="/static-page.css" />
  <link rel="canonical" href="https://fomobot-dun.vercel.app/articles.html" />
</head>
<body>
  <nav>
    <a href="/" class="brand">FomoBot</a>
    <div class="links">
      <a href="/about.html">소개</a>
      <a href="/articles.html">읽을거리</a>
      <a href="/methodology.html">방법론</a>
      <a href="/survivorship-bias.html">생존 편향</a>
      <a href="/glossary.html">용어 해설</a>
      <a href="/privacy.html">개인정보처리방침</a>
    </div>
  </nav>
  <main>
    <h1>읽을거리</h1>
    <p>FomoBot이 데이터를 보다가 발견한 것들, 랭킹을 만드는 방법, 그리고 이 서비스를 만들어가는 이야기를 씁니다.</p>

    <!--
      새 글 추가 방법
      1) 글 파일: frontend/public/<영문-slug>.html 로 추가 (nav는 이 파일의 nav를 그대로 복사)
      2) 이 파일의 해당 카테고리 <ul class="article-list"> 안에 <li> 블록을 복사해 채운다.
         카테고리는 "데이터 분석" / "방법론" / "개발기" 3개로 고정.
      3) 그 카테고리가 지금 비어 있어 통째로 주석 처리돼 있다면, 주석을 해제하고 첫 <li>를 채운다.
      4) frontend/public/sitemap.xml 에 새 글 URL 추가 (changefreq: monthly, priority: 0.7).
      5) 이 글이 최신 글이라면 frontend/src/data/latestArticle.ts 의 LATEST_ARTICLE 값을 이 글로 교체한다
         (메인 화면 랭킹 리스트 하단 "읽을거리" 카드에 노출되는 글).
    -->

    <!-- 카테고리: 데이터 분석 -->
    <section>
      <h2>데이터 분석</h2>
      <ul class="article-list">
        <li>
          <a href="/five-year-winner.html">5년 수익률 1위를 들고 있으려면</a>
          <span class="article-date">2026-07-14</span>
          <p class="article-summary">5년 랭킹 1위 종목의 수익률 뒤에는 -30%가 넘는 하락이 각각 네 번씩 있었습니다.</p>
        </li>
        <!-- 새 글은 이 위치에 <li> 블록을 추가 -->
      </ul>
    </section>

    <!-- 카테고리: 방법론 (아직 글 없음 — 첫 글을 쓸 때 아래 주석을 해제하고 <li>를 채운다)
    <section>
      <h2>방법론</h2>
      <ul class="article-list">
        <li>
          <a href="/SLUG.html">제목</a>
          <span class="article-date">YYYY-MM-DD</span>
          <p class="article-summary">한 줄 요약</p>
        </li>
      </ul>
    </section>
    -->

    <!-- 카테고리: 개발기 (아직 글 없음 — 위와 동일한 방식으로 주석 해제)
    <section>
      <h2>개발기</h2>
      <ul class="article-list">
        <li>
          <a href="/SLUG.html">제목</a>
          <span class="article-date">YYYY-MM-DD</span>
          <p class="article-summary">한 줄 요약</p>
        </li>
      </ul>
    </section>
    -->
  </main>
</body>
</html>
