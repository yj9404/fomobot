services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fomobot
      POSTGRES_PASSWORD: fomobot
      POSTGRES_DB: fomobot_re
    ports:
      - "5433:5432"   # 호스트 5433 → 컨테이너 5432 (stock DB와 포트 충돌 방지)
    volumes:
      - re_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fomobot -d fomobot_re"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  re_pgdata:
